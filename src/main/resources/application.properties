# ================================
# CONFIGURATION SERVEUR
# ================================
server.port=8080

# ================================
# CONFIGURATION BASE DE DONNèES
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/kandious_fashion?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# CONFIGURATION JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================================
# CONFIGURATION JWT
# ================================
jwt.secret=kandious_secret_key_2026_fashion_boutique
jwt.expiration=86400000

# ================================
# CONFIGURATION FICHIERS
# ================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================
# NOM APPLICATION
# ================================
spring.application.name=kandious-backend